name: CI

on:
  - pull_request
  - push

jobs:
  tests:
    runs-on: ubuntu-latest

    container:
      image: ${{ matrix.php-image }}
      options: --user root

    strategy:
      matrix:
        include:
          - php-image: 'duyler/php-zts:8.4'
            php-version: '8.4'
          - php-image: 'duyler/php-zts:8.5'
            php-version: '8.5'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine composer cache directory
        run: echo "COMPOSER_CACHE_DIR=$(composer config cache-dir)" >> $GITHUB_ENV

      - name: Cache dependencies installed with composer
        uses: actions/cache@v6
        with:
          path: ${{ env.COMPOSER_CACHE_DIR }}
          key: php${{ matrix.php-version }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            php${{ matrix.php-version }}-composer-
      - name: Update composer
        run: composer self-update

      - name: Install dependencies with composer
        run: composer update --ignore-platform-reqs --prefer-dist --no-interaction --no-progress --optimize-autoloader --ansi

      - name: Run tests
        run: php -d memory_limit=512M -d pcov.enabled=1 vendor/bin/phpunit --coverage-clover=coverage.xml --colors=always

      - name: Run PHP CS Fixer
        run: vendor/bin/php-cs-fixer check --diff -v

      - name: Run Psalm
        run: vendor/bin/psalm --shepherd

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  swoole_tests:
    runs-on: ubuntu-latest

    container:
      image: phpswoole/swoole:php8.5
      options: --user root

    steps:
      - name: Install git (not shipped in phpswoole image)
        run: apt-get update && apt-get install -y --no-install-recommends git

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine composer cache directory
        run: echo "COMPOSER_CACHE_DIR=$(composer config cache-dir)" >> $GITHUB_ENV

      - name: Cache dependencies installed with composer
        uses: actions/cache@v6
        with:
          path: ${{ env.COMPOSER_CACHE_DIR }}
          key: swoole-php8.5-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            swoole-php8.5-composer-

      - name: Install dependencies with composer
        run: composer update --ignore-platform-reqs --prefer-dist --no-interaction --no-progress --optimize-autoloader --ansi

      - name: Verify Swoole extension loaded
        run: php -m | grep -q '^swoole$' || (echo "Swoole extension not loaded" && exit 1)

      - name: Run Swoole concurrency tests
        run: php -d memory_limit=512M vendor/bin/phpunit --filter='SwooleSharedValidatorTest' --testdox --colors=always

  # FrankenPHP worker-SAPI concurrency coverage is tracked as a follow-up
  # to R4-TEST-001. The frankenphp extension is statically compiled into
  # the frankenphp binary and is only registered with the Zend engine
  # inside the worker SAPI (real web requests), so `FrankenPhpThreadedTest`
  # always skips under CLI SAPI and a CLI-based CI job yields no regression
  # signal. The test class is retained in tests/Concurrency for a future
  # worker-SAPI harness; see CHANGELOG 0.6.0 for the full rationale.

  infection:
    needs: tests
    runs-on: ubuntu-latest
    container:
      image: duyler/php-zts:8.5
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine composer cache directory
        run: echo "COMPOSER_CACHE_DIR=$(composer config cache-dir)" >> $GITHUB_ENV

      - name: Cache dependencies installed with composer
        uses: actions/cache@v6
        with:
          path: ${{ env.COMPOSER_CACHE_DIR }}
          key: infection-php8.5-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            infection-php8.5-composer-

      - name: Install dependencies with composer
        run: composer update --ignore-platform-reqs --prefer-dist --no-interaction --no-progress --optimize-autoloader --ansi

      - name: Run Infection
        run: php -d memory_limit=2G -d pcov.enabled=1 vendor/bin/infection --no-progress --threads=max
