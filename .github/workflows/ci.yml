name: CI

on:
  - pull_request
  - push

jobs:
  tests:
    runs-on: ubuntu-latest

    container:
      image: duyler/php-zts:8.5
      options: --user root

    strategy:
      matrix:
        php-image: ['duyler/php-zts:8.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine composer cache directory
        run: echo "COMPOSER_CACHE_DIR=$(composer config cache-dir)" >> $GITHUB_ENV

      - name: Cache dependencies installed with composer
        uses: actions/cache@v3
        with:
          path: ${{ env.COMPOSER_CACHE_DIR }}
          key: php${{ matrix.php }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            php${{ matrix.php }}-composer-
      - name: Update composer
        run: composer self-update

      - name: Install dependencies with composer php 8.5
        run: composer update --ignore-platform-reqs --prefer-dist --no-interaction --no-progress --optimize-autoloader --ansi

      - name: Run tests
        run: php -d memory_limit=512M -d pcov.enabled=1 vendor/bin/phpunit --coverage-clover=coverage.xml --colors=always

      - name: Run PHP CS Fixer
        run: vendor/bin/php-cs-fixer check --diff -v

      - name: Run Psalm
        run: vendor/bin/psalm --shepherd

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  swoole_tests:
    runs-on: ubuntu-latest

    container:
      image: phpswoole/swoole:php8.5
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine composer cache directory
        run: echo "COMPOSER_CACHE_DIR=$(composer config cache-dir)" >> $GITHUB_ENV

      - name: Cache dependencies installed with composer
        uses: actions/cache@v3
        with:
          path: ${{ env.COMPOSER_CACHE_DIR }}
          key: swoole-php8.5-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            swoole-php8.5-composer-

      - name: Install dependencies with composer
        run: composer update --ignore-platform-reqs --prefer-dist --no-interaction --no-progress --optimize-autoloader --ansi

      - name: Verify Swoole extension loaded
        run: php -m | grep -q '^swoole$' || (echo "Swoole extension not loaded" && exit 1)

      - name: Run Swoole concurrency tests
        run: |
          echo "=== DEBUG ==="
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "PWD=$(pwd)"
          ls -la phpunit.xml vendor/bin/phpunit 2>&1 || true
          echo "=== END DEBUG ==="
          php -d memory_limit=512M vendor/bin/phpunit --filter='SwooleSharedValidatorTest' --testdox --colors=always
