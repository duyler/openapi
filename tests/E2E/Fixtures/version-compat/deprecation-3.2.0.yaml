openapi: 3.2.0
info:
  title: Deprecation Surface API
  version: 1.0.0
paths:
  /resource:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Item'
      responses:
        '200':
          description: OK
components:
  schemas:
    Item:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          nullable: true
        tag:
          type: string
          example: legacy-example
